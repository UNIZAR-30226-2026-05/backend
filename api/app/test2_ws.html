<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test WebSocket Oca - Avanzado</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #222; color: #fff; }
        input, button, select { padding: 10px; margin: 5px; font-size: 16px; }
        #mensajes { background: #000; color: #0f0; padding: 15px; height: 350px; overflow-y: scroll; font-family: monospace; border: 1px solid #444; }
        .panel { background: #333; padding: 15px; margin-top: 15px; border-radius: 8px; }
        .action-btn { background: #007BFF; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .action-btn:hover { background: #0056b3; }
        .disconnect-btn { background: #dc3545; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .disconnect-btn:hover { background: #c82333; }
        .connect-btn { background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .connect-btn:hover { background: #218838; }
    </style>
</head>
<body>

    <h2>Simulador de Jugador - GameManager</h2>
    
    <div class="panel">
        <label>ID Partida:</label>
        <input type="number" id="id_partida" value="1" style="width: 60px;">
        
        <label>Tu Usuario:</label>
        <input type="text" id="usuario" placeholder="Ej: Paco">
        
        <button class="connect-btn" onclick="conectar()">Conectar al Lobby</button>
        <button class="disconnect-btn" onclick="desconectar()">Desconectar</button>
    </div>
    
    <div class="panel">
        <h3>Acciones del Juego</h3>
        
        <div>
            <label>Personaje:</label>
            <select id="personaje_select">
                <option value="Vidente">Vidente</option>
                <option value="Videojugador">Videojugador</option>
                <option value="Escapista">Escapista</option>
                <option value="Banquero">Banquero</option> <!-- HACER QUE SEA EL 4o para poder robar a todos-->
            </select>
            <button class="action-btn" onclick="enviarSelectPlayer()">Elegir Personaje</button>
        </div>
        
        <hr style="border-color: #555;">

        <div>
            <button class="action-btn" onclick="enviarMovePlayer()">Mover Jugador (Tirar dados guardados)</button>
        </div>

        <hr style="border-color: #555;">

        <div>
            <button class="action-btn" onclick="enviarEndRound()">Terminar Ronda</button>
        </div>
    </div>

    <!-- NUEVO PANEL VIDEOJUGADOR -->
    <div class="panel" id="panel_minijuegos" style="display:none;">
        <h3>🎮 Elegir Minijuego (Videojugador)</h3>
        
        <div>
            <label>Minijuego:</label>
            <select id="minijuego_select"></select>
        </div>

        <button class="action-btn" onclick="enviarMinijuego()">Iniciar Minijuego</button>
    </div>

    <!-- NUEVO PANEL BANQUERO -->
    <div class="panel" id="panel_banquero" style="display:none;">
        <h3>💰 Robar Monedas (Banquero)</h3>
        
        <div>
            <label>Robar a:</label>
            <select id="victimas_select"></select>
        </div>

        <button class="action-btn" onclick="enviarRoboMonedas()">Robar Monedas</button>
    </div>

    <h3>Consola del Servidor:</h3>
    <div id="mensajes"></div>

    <script>
        let ws = null;
        let mi_usuario = "";
        let mi_personaje = "";
        let jugadores = {};

        function log(mensaje) {
            const div = document.getElementById("mensajes");
            div.innerHTML += `<div>> ${mensaje}</div>`;
            div.scrollTop = div.scrollHeight;
        }

        function conectar() {
            const partida = document.getElementById("id_partida").value;
            const usuario = document.getElementById("usuario").value;

            if(!usuario) { alert("Pon un nombre de usuario"); return; }

            mi_usuario = usuario;
            const url = `ws://localhost:8080/ws/partida/${partida}/${usuario}`;
            log(`Conectando a ${url}...`);
            
            ws = new WebSocket(url);

            ws.onopen = () => log("✅ CONECTADO AL SERVIDOR");
            ws.onclose = () => log("❌ DESCONECTADO DEL SERVIDOR");
            ws.onerror = () => log("⚠️ ERROR DE CONEXIÓN");
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    log(`📩 Recibido: ${JSON.stringify(data, null, 2)}`);

                    // Detectar cuando se elige personaje
                    if (data.type === "player_selected") {
                        jugadores[data.user] = data.character;
                        
                        // Si soy yo quien eligió Banquero, muestro el panel
                        if (data.user === mi_usuario && data.character === "Banquero") {
                            mi_personaje = "Banquero";
                            document.getElementById("panel_banquero").style.display = "block";
                            actualizarVictimas();
                        }
                    }

                    // Actualizar lista de víctimas cuando cambian los balances (después de cada ronda)
                    if (data.type === "balances_changed") {
                        if (mi_personaje === "Banquero") {
                            actualizarVictimas();
                        }
                    }

                    // NUEVO: detectar minijuegos
                    if (data.type === "choose_minijuego") {
                        mostrarMinijuegos(data.minijuegos);
                    }

                } catch (e) {
                    log(`📩 Texto Recibido: ${event.data}`);
                }
            };
        }

        function desconectar() {
            if(ws) {
                ws.close();
                ws = null;
                mi_usuario = "";
                mi_personaje = "";
                jugadores = {};
            }
        }

        function enviarWebSocket(accion, payload = {}) {
            if(!ws || ws.readyState !== WebSocket.OPEN) { 
                alert("¡Conéctate primero y asegúrate de que el socket está abierto!"); 
                return; 
            }
            
            const mensaje = { 
                "action": accion,
                "payload": payload
            };
            
            ws.send(JSON.stringify(mensaje));
            log(`📤 ENVIADO: ${JSON.stringify(mensaje)}`);
        }

        function enviarSelectPlayer() {
            const personaje = document.getElementById("personaje_select").value;
            enviarWebSocket("select_player", { "character": personaje });
        }

        function enviarMovePlayer() {
            enviarWebSocket("move_player");
        }

        function enviarEndRound() {
            enviarWebSocket("end_round");
        }

        // Actualizar lista de otras víctimas disponibles
        function actualizarVictimas() {
            const select = document.getElementById("victimas_select");
            select.innerHTML = "";

            // Mostrar todos los jugadores excepto yo
            for (const usuario in jugadores) {
                if (usuario !== mi_usuario) {
                    const option = document.createElement("option");
                    option.value = usuario;
                    option.textContent = usuario + " (" + jugadores[usuario] + ")";
                    select.appendChild(option);
                }
            }
        }

        // NUEVO: enviar robo de monedas
        function enviarRoboMonedas() {
            const select = document.getElementById("victimas_select");
            const victima = select.value;

            if (!victima) {
                alert("Debes seleccionar a quién robar");
                return;
            }

            enviarWebSocket("banquero", {
                "robar_a": victima
            });
        }

        // NUEVO: mostrar minijuegos
        function mostrarMinijuegos(minijuegos) {
            const panel = document.getElementById("panel_minijuegos");
            const select = document.getElementById("minijuego_select");

            select.innerHTML = "";

            minijuegos.forEach(juego => {
                const option = document.createElement("option");
                option.value = juego.nombre || juego;
                option.textContent = juego.nombre || juego;
                option.dataset.descripcion = juego.descripcion || "Sin descripción";
                select.appendChild(option);
            });

            panel.style.display = "block";
        }

        // NUEVO: enviar selección al backend
        function enviarMinijuego() {
            const select = document.getElementById("minijuego_select");
            const selectedOption = select.options[select.selectedIndex];

            const minijuego = selectedOption.value;
            const descripcion = selectedOption.dataset.descripcion;

            enviarWebSocket("ini_round", {
                minijuego: minijuego,
                descripcion: descripcion
            });
        }
    </script>
</body>
</html>
